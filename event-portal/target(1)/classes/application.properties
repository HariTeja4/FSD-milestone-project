# ═══════════════════════════════════════════════
# VELTECH UNIVERSITY — CAMPUS EVENT PORTAL
# application.properties
# ═══════════════════════════════════════════════

spring.application.name=veltech-portal

# ── Server ──
server.port=8080
# ── MySQL Database Configuration ──
spring.datasource.url=jdbc:mysql://localhost:3306/veltech_portal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA Configuration ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Jackson ──
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ── Logging ──
logging.level.com.veltech.portal=INFO
logging.level.org.hibernate.SQL=WARN
